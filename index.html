<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryMap Builder</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ed-bg: #FAF5EF; --ed-panel: #F2E8DD; --ed-card: #FFF9F3; --ed-border: #D6C4B0;
  --ed-accent: #A65E2E; --ed-accent-hover: #8B4F26; --ed-secondary: #C49A6C; --ed-secondary-hover: #B08858;
  --ed-text: #2A1F18; --ed-muted: #7A6555; --ed-placeholder: #B0A090;
  --ed-danger: #C0503A; --ed-danger-hover: #A3422F; --ed-success: #5B8A5E;
  --ed-hint-bg: rgba(42,31,24,.8);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; background: var(--ed-bg); color: var(--ed-text); }

/* ── Toolbar ── */
#toolbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--ed-panel); border-bottom: 1px solid var(--ed-border); min-height: 48px; z-index: 1000; flex-wrap: wrap; }
#toolbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
#toolbar h1 { font-size: 16px; font-weight: 600; color: var(--ed-accent); margin-right: 8px; }
#palette-bar { display: flex; align-items: center; gap: 6px; margin-right: 8px; }
#palette-bar .palette-label { font-size: 12px; color: var(--ed-muted); margin-right: 4px; }
#palette-buttons { display: flex; gap: 4px; }
.palette-btn { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border: 1px solid var(--ed-border); border-radius: 6px; background: var(--ed-card); color: var(--ed-muted); font-size: 12px; cursor: pointer; transition: border-color .2s, background .2s; }
.palette-btn:hover { border-color: var(--ed-accent); background: var(--ed-bg); }
.palette-btn.active { border-color: var(--ed-accent); background: var(--ed-panel); color: var(--ed-text); font-weight: 600; }
.palette-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
#toolbar input[type=text] { background: var(--ed-card); border: 1px solid var(--ed-border); color: var(--ed-text); padding: 4px 10px; border-radius: 4px; font-size: 14px; width: 220px; }
.btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background .2s; }
.btn-primary { background: var(--ed-accent); color: var(--ed-card); }
.btn-primary:hover { background: var(--ed-accent-hover); }
.btn-secondary { background: var(--ed-secondary); color: var(--ed-text); }
.btn-secondary:hover { background: var(--ed-secondary-hover); }
.btn-ghost { background: transparent; color: var(--ed-muted); border: 1px solid var(--ed-border); }
.btn-ghost:hover { background: var(--ed-panel); color: var(--ed-text); }
.btn-danger { background: var(--ed-danger); color: var(--ed-card); }
.btn-danger:hover { background: var(--ed-danger-hover); }

/* ── Edit Mode ── */
#edit-mode { display: flex; height: calc(100vh - 48px); }
#section-panel { width: 55%; min-width: 400px; overflow-y: auto; background: var(--ed-panel); border-right: 1px solid var(--ed-border); display: flex; flex-direction: column; }
#section-list { flex: 1; overflow-y: auto; padding: 8px; }
#add-section-bar { padding: 10px; border-top: 1px solid var(--ed-border); }
#map-edit-container { flex: 1; position: relative; }
#map-edit { height: 100%; width: 100%; }
.map-hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: var(--ed-hint-bg); color: var(--ed-card); padding: 6px 14px; border-radius: 20px; font-size: 12px; z-index: 800; pointer-events: none; }

/* Hero card */
.hero-card { background: var(--ed-card); border: 1px solid var(--ed-accent); border-radius: 6px; padding: 12px; margin-bottom: 12px; transition: opacity .2s, filter .2s; opacity: 0.45; filter: grayscale(30%); cursor: pointer; }
.hero-card.active { opacity: 1; filter: none; }
.hero-card .hero-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--ed-accent); margin-bottom: 8px; font-weight: 700; }
.hero-card input, .hero-card textarea { width: 100%; background: var(--ed-bg); border: 1px solid var(--ed-border); color: var(--ed-text); padding: 6px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 6px; font-family: inherit; }
.hero-card textarea { resize: vertical; min-height: 40px; }
.hero-card input::placeholder, .hero-card textarea::placeholder { color: var(--ed-placeholder); }
.hero-card input[readonly], .hero-card textarea[readonly] { cursor: default; }
.hero-color-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.hero-color-row label { font-size: 12px; color: var(--ed-muted); }
.hero-color-row input[type=color] { width: 36px; height: 28px; padding: 2px; border: 1px solid var(--ed-border); border-radius: 4px; cursor: pointer; background: var(--ed-bg); }
.hero-color-row .hero-color-reset { font-size: 11px; color: var(--ed-muted); cursor: pointer; text-decoration: underline; }
.hero-color-row .hero-color-reset:hover { color: var(--ed-accent); }

/* Section cards */
.section-card { background: var(--ed-card); border: 1px solid var(--ed-border); border-radius: 6px; padding: 12px; margin-bottom: 8px; transition: border-color .2s, opacity .2s, filter .2s; opacity: 0.45; filter: grayscale(30%); }
.section-card.active { border-color: var(--ed-accent); opacity: 1; filter: none; }
.section-card.dragging { opacity: 0.4; }
.section-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.section-card-header .num { background: var(--ed-accent); color: var(--ed-card); width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.section-card input, .section-card textarea { width: 100%; background: var(--ed-bg); border: 1px solid var(--ed-border); color: var(--ed-text); padding: 6px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 6px; font-family: inherit; }
.section-card textarea { resize: vertical; min-height: 60px; }
.section-card input::placeholder, .section-card textarea::placeholder { color: var(--ed-placeholder); }
.section-card input[readonly], .section-card textarea[readonly] { cursor: default; }
.img-drop { border: 2px dashed var(--ed-border); border-radius: 6px; padding: 12px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; margin-bottom: 6px; font-size: 12px; color: var(--ed-muted); position: relative; }
.img-drop:hover, .img-drop.dragover { border-color: var(--ed-accent); background: rgba(0,0,0,.03); }
.img-drop input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 5; }
.img-drop.has-image input[type=file] { pointer-events: none; }
.img-drop .thumb { max-width: 100%; max-height: 120px; border-radius: 4px; margin-bottom: 6px; display: block; }
.img-drop .remove-img { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.75); color: #fff; border: 1px solid rgba(255,255,255,.4); border-radius: 4px; width: 28px; height: 28px; padding: 0; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: background .2s; }
.img-drop .remove-img:hover { background: var(--ed-danger); border-color: var(--ed-danger); }
.img-drop .remove-img svg { width: 14px; height: 14px; fill: currentColor; }
.section-loc { font-size: 11px; color: var(--ed-muted); margin-top: 4px; }
.section-loc.set { color: var(--ed-success); }
.section-card-actions { display: flex; gap: 6px; }
.section-card-actions .btn { padding: 3px 8px; font-size: 11px; }

/* ── Preview Mode ── */
#preview-mode {
  --palette-accent: #A65E2E;
  --palette-bg: #faf5ef;
  --palette-bg-dark: #f2e8dd;
  --palette-bg-secondary: #e8ddd0;
  --palette-border: #d6c4b0;
  --palette-secondary: #C49A6C;
  --palette-text: #2A1F18;
  --palette-text-muted: #7A6555;
  --palette-control-text: #2A1F18;
}
#preview-mode { display: none; height: calc(100vh - 48px); overflow-y: auto; background: var(--palette-bg); }
#preview-mode #hero-fullpage { width: 100%; height: calc(100vh - 48px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: var(--palette-bg); background-size: cover; background-position: center; position: relative; }
#preview-mode #hero-fullpage.has-bg::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,.55); }
#preview-mode #hero-fullpage h1 { position: relative; z-index: 1; font-size: 48px; color: var(--palette-accent); text-shadow: 0 2px 12px rgba(0,0,0,.7); margin-bottom: 16px; }
#preview-mode #hero-fullpage p { position: relative; z-index: 1; font-size: 20px; color: var(--palette-text-muted); text-shadow: 0 1px 6px rgba(0,0,0,.6); max-width: 600px; line-height: 1.6; }
#preview-mode #hero-fullpage .scroll-hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1; font-size: 13px; color: #888; letter-spacing: 1px; }
#preview-mode #hero-fullpage .scroll-hint span { display: block; margin-top: 6px; animation: bounce 2s infinite; font-size: 20px; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
#preview-mode #story-body { display: flex; align-items: flex-start; min-height: calc(100vh - 48px); background: var(--palette-bg); }
#preview-mode #preview-left { width: 35%; background: var(--palette-bg); padding: 16px; }
#preview-mode #map-preview { position: sticky; top: 16px; width: 100%; height: 35vh; border-bottom: 1px solid var(--palette-border); z-index: 10; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
#preview-mode #narrative { width: 100%; }
#preview-mode #preview-right { position: sticky; top: 0; width: 65%; height: calc(100vh - 48px); display: flex; align-items: center; justify-content: center; background: var(--palette-bg-dark); overflow: hidden; }
#preview-mode #preview-right img { position: absolute; width: 100%; height: 100%; object-fit: contain; border-radius: 10px; transition: opacity 1.2s ease; opacity: 0; }
#preview-mode #preview-right img.active-img { opacity: 1; }
#preview-mode .story-section { min-height: 60vh; display: flex; flex-direction: column; justify-content: center; padding: 40px 30px; transition: opacity .4s; }
#preview-mode .story-section.dim { opacity: 0.25; }
#preview-mode .story-section h2 { font-size: 26px; color: var(--palette-accent); margin-bottom: 14px; }
#preview-mode .story-section p { font-size: 15px; line-height: 1.7; color: var(--palette-text-muted); }
#preview-mode .numbered-marker { background: var(--palette-accent); color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
#preview-mode .numbered-marker.active-marker { background: #fff; color: var(--palette-accent); transform: scale(1.3); }
#preview-mode .leaflet-control-zoom a { background: var(--palette-bg-secondary) !important; color: var(--palette-control-text) !important; border-color: var(--palette-border) !important; }
#preview-mode .leaflet-control-zoom a:hover { background: var(--palette-border) !important; color: var(--palette-control-text) !important; }
#preview-mode::-webkit-scrollbar { width: 6px; }
#preview-mode::-webkit-scrollbar-track { background: var(--palette-bg); }
#preview-mode::-webkit-scrollbar-thumb { background: var(--palette-secondary); border-radius: 3px; }

/* Scrollbar (edit mode) */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--ed-bg); }
::-webkit-scrollbar-thumb { background: var(--ed-secondary); border-radius: 3px; }

/* Number markers on map (edit mode) */
.numbered-marker { background: var(--ed-accent); color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.3); }
.numbered-marker.active-marker { background: #fff; color: var(--ed-accent); transform: scale(1.3); }

/* Leaflet zoom control styling (edit mode) */
.leaflet-control-zoom a { background: var(--ed-panel) !important; color: var(--ed-text) !important; border-color: var(--ed-border) !important; }
.leaflet-control-zoom a:hover { background: var(--ed-border) !important; color: var(--ed-text) !important; }

/* ── Landing Page ── */
#landing-page { height: 100vh; background: var(--ed-bg); padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
#landing-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
#landing-header h1 { font-size: 28px; font-weight: 700; color: var(--ed-accent); }
#storymap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; align-content: start; flex: 1; }
.storymap-card { background: var(--ed-card); border: 1px solid var(--ed-border); border-radius: 8px; overflow: hidden; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.storymap-card:hover { border-color: var(--ed-accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.storymap-card-thumb { width: 100%; height: 160px; background: var(--ed-panel); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.storymap-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.storymap-card-thumb .placeholder-icon { font-size: 48px; color: var(--ed-secondary); }
.storymap-card-body { padding: 14px; }
.storymap-card-body h3 { font-size: 16px; color: var(--ed-text); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.storymap-card-meta { font-size: 12px; color: var(--ed-muted); margin-bottom: 12px; }
.storymap-card-actions { display: flex; gap: 8px; }
.storymap-card.create-new { border-style: dashed; border-color: var(--ed-secondary); display: flex; align-items: center; justify-content: center; min-height: 240px; }
.storymap-card.create-new:hover { border-color: var(--ed-accent); background: rgba(0,0,0,.02); }
.create-new-content { text-align: center; color: var(--ed-muted); }
.create-new-content .plus { font-size: 48px; color: var(--ed-accent); display: block; margin-bottom: 8px; }
#btn-back { background: transparent; border: 1px solid var(--ed-border); color: var(--ed-muted); padding: 6px 10px; border-radius: 4px; cursor: pointer; transition: background .2s, color .2s; display: inline-flex; align-items: center; justify-content: center; }
#btn-back:hover { background: var(--ed-panel); color: var(--ed-text); }
#btn-back svg { width: 18px; height: 18px; fill: currentColor; }
#landing-footer { margin-top: auto; padding-top: 24px; border-top: 1px solid var(--ed-border); text-align: center; font-size: 13px; color: var(--ed-muted); line-height: 1.6; flex-shrink: 0; }
#landing-footer a { color: var(--ed-accent); text-decoration: none; }
#landing-footer a:hover { text-decoration: underline; }
</style>
</head>

// ── State ──

// ── IndexedDB Storage (replaces localStorage for much larger capacity) ──
const DB_NAME = 'storymap-db';
const DB_VERSION = 1;
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { _db = req.result; resolve(_db); };
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('index')) db.createObjectStore('index');
      if (!db.objectStoreNames.contains('storymaps')) db.createObjectStore('storymaps', { keyPath: 'id' });
    };
  });
}

async function dbGet(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(storeName, value, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = key !== undefined ? store.put(value, key) : store.put(value);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function dbDelete(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

    accent: '#5B6DAA', bg: '#f4f5f7', bgDark: '#e8eaf0', bgSecondary: '#d4d8e4', border: '#c4c8d4', secondary: '#8892B0', text: '#1A1D2A', textMuted: '#636980', controlText: '#1A1D2A',
    ed: { bg:'#F4F5F7', panel:'#E8EAF0', card:'#FAFBFD', border:'#C4C8D4', accent:'#5B6DAA', accentHover:'#4A5A90', secondary:'#8892B0', secondaryHover:'#76809E', text:'#1A1D2A', muted:'#636980', placeholder:'#A0A4B4', danger:'#B04848', dangerHover:'#943C3C', success:'#5B8A6E', hintBg:'rgba(20,22,34,.8)' }
  }
};
let paletteId = 'cabin';
let editMap, previewMap;
let editMarkers = [];
let previewMarkers = [];
let mode = 'edit';

// ── ID & Thumbnail Utilities ──
function generateId() {
  return 'sm_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
}

function generateThumbnail(dataUrl, callback) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    // 400x240 matches card thumb display (~280x160) at ~1.4x for crisp rendering
    canvas.width = 400; canvas.height = 240;
    canvas.getContext('2d').drawImage(img, 0, 0, 400, 240);
    callback(canvas.toDataURL('image/jpeg', 0.75));
  };
  img.src = dataUrl;
}

// ── Index Management (async IndexedDB) ──
async function loadIndex() {
  const arr = await dbGet('index', 'index');
  return Array.isArray(arr) ? arr : [];
}

async function saveIndex(index) {
  await dbPut('index', index, 'index');
}

async function updateIndexEntry(id, updates) {
  const index = await loadIndex();
  const entry = index.find(e => e.id === id);
  if (entry) {
    Object.assign(entry, updates, { lastEdited: Date.now() });
    await saveIndex(index);
  }
}

async function removeFromIndex(id) {
  const index = await loadIndex();
  await saveIndex(index.filter(e => e.id !== id));
}

// ── Per-Storymap Load / Save ──
async function loadStorymap(id) {
  const doc = await dbGet('storymaps', id);
  if (doc) {
    sections = doc.sections || [];
    storyTitle = doc.title || 'Untitled';
    heroSubtitle = doc.heroSubtitle || 'Scroll down to explore';
    heroImage = doc.heroImage || '';
    heroTextColor = doc.heroTextColor || '';
    mapZoom = parseInt(doc.zoom || '12');
    paletteId = doc.palette || 'cabin';
  } else {
    sections = [];
    storyTitle = 'Untitled';
    heroSubtitle = 'Scroll down to explore';
    heroImage = '';
    heroTextColor = '';
    mapZoom = 12;
    paletteId = 'cabin';
  }
  if (!PALETTES[paletteId]) paletteId = 'cabin';
  currentStorymapId = id;
}

async function deleteStorymapData(id) {
  await dbDelete('storymaps', id);
  await removeFromIndex(id);
}

async function save() {
  if (!currentStorymapId) return;
  try {
    await dbPut('storymaps', {
      id: currentStorymapId,
      sections,
      title: storyTitle,
      heroSubtitle,
      heroImage,
      heroTextColor,
      zoom: mapZoom,
      palette: paletteId
    });
    await updateIndexEntry(currentStorymapId, { title: storyTitle });
  } catch (e) {
    console.warn('IndexedDB save failed:', e);
    alert('Storage error. Try deleting old storymaps or clearing site data.');
  }
}

// ── Migration: localStorage → IndexedDB ──
async function migrateIfNeeded() {
  await openDB();
  const lsIndex = localStorage.getItem('storymap-index');
  if (lsIndex) {
    let index;
    try { index = JSON.parse(lsIndex); } catch (_) { return; }
    if (!Array.isArray(index)) return;
    for (const entry of index) {
      const p = 'storymap:' + entry.id + ':';
      const doc = {
        id: entry.id,
        sections: JSON.parse(localStorage.getItem(p + 'sections') || '[]'),
        title: localStorage.getItem(p + 'title') || 'Untitled',
        heroSubtitle: localStorage.getItem(p + 'hero-subtitle') || 'Scroll down to explore',
        heroImage: localStorage.getItem(p + 'hero-image') || '',
        heroTextColor: localStorage.getItem(p + 'hero-text-color') || '',
        zoom: parseInt(localStorage.getItem(p + 'zoom') || '12'),
        palette: localStorage.getItem(p + 'palette') || 'cabin'
      };
      await dbPut('storymaps', doc);
    }
    await saveIndex(index);
    index.forEach(e => {
      const p = 'storymap:' + e.id + ':';
      ['sections', 'title', 'hero-subtitle', 'hero-image', 'hero-text-color', 'zoom', 'palette'].forEach(k => localStorage.removeItem(p + k));
    });
    localStorage.removeItem('storymap-index');
  }
  const oldSections = localStorage.getItem('storymap-sections');
  if (oldSections) {
    const id = generateId();
    const doc = {
      id,
      sections: JSON.parse(oldSections),
      title: localStorage.getItem('storymap-title') || 'My Story',
      heroSubtitle: localStorage.getItem('storymap-hero-subtitle') || 'Scroll down to explore',
      heroImage: localStorage.getItem('storymap-hero-image') || '',
      heroTextColor: localStorage.getItem('storymap-hero-text-color') || '',
      zoom: parseInt(localStorage.getItem('storymap-zoom') || '12'),
      palette: localStorage.getItem('storymap-palette') || 'cabin'
    };
    await dbPut('storymaps', doc);
    const img = doc.heroImage;
    const entry = { id, title: doc.title, heroImageThumb: '', lastEdited: Date.now(), createdAt: Date.now() };
    const index = await loadIndex();
    index.push(entry);
    await saveIndex(index);
    if (img) {
      generateThumbnail(img, async (thumb) => {
        const idx = await loadIndex();
        const e = idx.find(x => x.id === id);
        if (e) { e.heroImageThumb = thumb; await saveIndex(idx); }
        if (currentView === 'landing') await renderLanding();
      });
    }
    ['storymap-sections', 'storymap-title', 'storymap-hero-subtitle', 'storymap-hero-image', 'storymap-hero-text-color', 'storymap-zoom', 'storymap-palette'].forEach(k => localStorage.removeItem(k));
  }
}

// ── Landing Page ──
async function renderLanding() {
  const index = await loadIndex();
  const grid = document.getElementById('storymap-grid');
  grid.innerHTML = '';

  const createCard = document.createElement('div');
  createCard.className = 'storymap-card create-new';
  createCard.innerHTML = '<div class="create-new-content"><span class="plus">+</span><div>Create New StoryMap</div></div>';
  createCard.addEventListener('click', createNewStorymap);
  grid.appendChild(createCard);

  index.sort((a, b) => b.lastEdited - a.lastEdited);

  index.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'storymap-card';
    const dateStr = new Date(entry.lastEdited).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    card.innerHTML = `
      <div class="storymap-card-thumb">
        ${entry.heroImageThumb ? '<img src="' + entry.heroImageThumb + '" alt="">' : '<span class="placeholder-icon">&#x1F5FA;</span>'}
      </div>
      <div class="storymap-card-body">
        <h3>${esc(entry.title || 'Untitled')}</h3>
        <div class="storymap-card-meta">Last edited: ${dateStr}</div>
        <div class="storymap-card-actions">
          <button class="btn btn-primary btn-edit-map" data-id="${entry.id}">Edit</button>
          <button class="btn btn-danger btn-delete-map" data-id="${entry.id}">Delete</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.btn-edit-map').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); openStorymap(btn.dataset.id); });
  });
  grid.querySelectorAll('.btn-delete-map').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (confirm('Delete this storymap? This cannot be undone.')) { await deleteStorymapData(btn.dataset.id); renderLanding(); }
    });
  });
  grid.querySelectorAll('.storymap-card:not(.create-new)').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      const editBtn = card.querySelector('.btn-edit-map');
      if (editBtn) openStorymap(editBtn.dataset.id);
    });
  });
}

// ── Navigation ──
async function showLanding() {
  currentView = 'landing';
  currentStorymapId = null;
  document.body.style.overflow = 'auto';
  document.body.style.height = 'auto';
  document.getElementById('landing-page').style.display = 'block';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('edit-mode').style.display = 'none';
  document.getElementById('preview-mode').style.display = 'none';
  if (editMap) { editMap.remove(); editMap = null; }
  if (previewMap) { previewMap.remove(); previewMap = null; }
  await renderLanding();
}

async function openStorymap(id) {
  await loadStorymap(id);
  currentView = 'edit';
  mode = 'edit';
  activeIdx = -1;
  document.body.style.overflow = 'hidden';
  document.body.style.height = '100vh';
  document.getElementById('landing-page').style.display = 'none';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('edit-mode').style.display = 'flex';
  document.getElementById('preview-mode').style.display = 'none';
  document.getElementById('btn-preview').style.display = '';
  document.getElementById('btn-edit').style.display = 'none';
  document.getElementById('story-title').value = storyTitle;
  initEditMap();
  renderPaletteBar();
  applyPaletteToPreview();
  if (sections.length === 0) {
    sections.push({ title: 'Welcome', body: 'Click the map to set this section\'s location, then add more sections to build your story.', image: '', lat: null, lng: null, zoom: 10 });
    await save();
  }
  renderSections();
  renderEditMarkers();
}

function initEditMap() {
  if (editMap) editMap.remove();
  editMap = L.map('map-edit').setView([20, 0], 2);
  L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(editMap);
  editMap.on('click', function(e) {
    if (sections.length === 0 || activeIdx < 0) return;
    const s = sections[activeIdx];
    s.lat = e.latlng.lat;
    s.lng = e.latlng.lng;
    save();
    renderSections();
    renderEditMarkers();
  });
}

async function createNewStorymap() {
  const id = generateId();
  const index = await loadIndex();
  index.push({ id, title: 'Untitled Story', heroImageThumb: '', lastEdited: Date.now(), createdAt: Date.now() });
  await saveIndex(index);
  await dbPut('storymaps', {
    id,
    sections: [{ title: 'Welcome', body: 'Click the map to set this section\'s location, then add more sections to build your story.', image: '', lat: null, lng: null, zoom: 10 }],
    title: 'Untitled Story',
    heroSubtitle: 'Scroll down to explore',
    heroImage: '',
    heroTextColor: '',
    zoom: 12,
    palette: 'cabin'
  });
  await openStorymap(id);
}

async function returnToLanding() {
  if (currentStorymapId) await save();
  if (previewMap) { previewMap.remove(); previewMap = null; }
  await showLanding();
}

// ── Palette ──
function renderPaletteBar() {
  const container = document.getElementById('palette-buttons');
  container.innerHTML = Object.entries(PALETTES).map(([id, p]) =>
    `<button class="palette-btn ${id === paletteId ? 'active' : ''}" data-palette="${id}" title="${p.name}">
      <span class="palette-swatch" style="background:linear-gradient(135deg,${p.swatch[0]} 0%,${p.swatch[1]} 50%,${p.swatch[2]} 100%)"></span>
      <span class="palette-name">${p.name}</span>
    </button>`
  ).join('');
  container.querySelectorAll('.palette-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      paletteId = btn.dataset.palette;
      save();
      renderPaletteBar();
      applyPaletteToPreview();
    });
  });
}

function applyPaletteToPreview() {
  const p = PALETTES[paletteId] || PALETTES.cabin;
  const el = document.getElementById('preview-mode');
  if (el) {
    el.style.setProperty('--palette-accent', p.accent);
    el.style.setProperty('--palette-bg', p.bg);
    el.style.setProperty('--palette-bg-dark', p.bgDark);
    el.style.setProperty('--palette-bg-secondary', p.bgSecondary);
    el.style.setProperty('--palette-border', p.border);
    el.style.setProperty('--palette-secondary', p.secondary);
    el.style.setProperty('--palette-text', p.text);
    el.style.setProperty('--palette-text-muted', p.textMuted);
    el.style.setProperty('--palette-control-text', p.controlText);
  }
  // Also apply editor palette
  const ed = p.ed;
  const r = document.documentElement.style;
  r.setProperty('--ed-bg', ed.bg); r.setProperty('--ed-panel', ed.panel);
  r.setProperty('--ed-card', ed.card); r.setProperty('--ed-border', ed.border);
  r.setProperty('--ed-accent', ed.accent); r.setProperty('--ed-accent-hover', ed.accentHover);
  r.setProperty('--ed-secondary', ed.secondary); r.setProperty('--ed-secondary-hover', ed.secondaryHover);
  r.setProperty('--ed-text', ed.text); r.setProperty('--ed-muted', ed.muted);
  r.setProperty('--ed-placeholder', ed.placeholder);
  r.setProperty('--ed-danger', ed.danger); r.setProperty('--ed-danger-hover', ed.dangerHover);
  r.setProperty('--ed-success', ed.success); r.setProperty('--ed-hint-bg', ed.hintBg);
}

// Resize image to fit within max dimensions and return compressed data URL
// IndexedDB allows larger storage, so we use 1200px and 0.7 quality for better image quality
function resizeImage(dataUrl, maxSize, callback) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxSize || h > maxSize) {
      if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
      else { w = Math.round(w * maxSize / h); h = maxSize; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.7));
  };
  img.src = dataUrl;
}

// ── Render section cards ──
function renderSections() {
  const list = document.getElementById('section-list');
  list.innerHTML = '';

  // Hero card
  const hero = document.createElement('div');
  hero.className = 'hero-card' + (activeIdx === -1 ? ' active' : '');
  const heroActive = activeIdx === -1;
  hero.innerHTML = `
    <div class="hero-label">Hero / Intro Section</div>
    <input type="text" id="hero-title-input" placeholder="Story title" value="${esc(storyTitle)}" ${!heroActive ? 'readonly' : ''}>
    <textarea id="hero-subtitle-input" placeholder="Subtitle or intro text" ${!heroActive ? 'readonly' : ''}>${esc(heroSubtitle)}</textarea>
    <div class="hero-color-row">
      <label for="hero-text-color">Text color:</label>
      <input type="color" id="hero-text-color" value="${heroTextColor || '#ffffff'}" title="Hero text color" ${!heroActive ? 'disabled' : ''}>
      <span class="hero-color-reset" id="hero-color-reset">Use palette default</span>
    </div>
    <div class="img-drop${heroImage ? ' has-image' : ''}" id="hero-img-drop">
      ${heroImage ? `<img class="thumb" src="${heroImage}"><button class="remove-img" id="hero-img-remove" title="Remove image"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>` : 'Drop hero background image or click to upload'}
      <input type="file" accept="image/*" id="hero-img-file">
    </div>
  `;
  hero.addEventListener('click', (e) => {
    if (e.target.closest('button') || e.target.closest('.img-drop')) return;
    if (heroActive && (e.target.closest('.hero-color-row') || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    activeIdx = -1;
    renderSections();
  });
  list.appendChild(hero);
  document.getElementById('hero-title-input').addEventListener('input', (e) => {
    storyTitle = e.target.value;
    document.getElementById('story-title').value = storyTitle;
    save();
  });
  document.getElementById('hero-subtitle-input').addEventListener('input', (e) => {
    heroSubtitle = e.target.value;
    save();
  });
  const heroColorInput = document.getElementById('hero-text-color');
  heroColorInput.value = heroTextColor || '#ffffff';
  heroColorInput.addEventListener('input', (e) => {
    heroTextColor = e.target.value;
    save();
  });
  document.getElementById('hero-color-reset').addEventListener('click', (e) => {
    e.stopPropagation();
    heroTextColor = '';
    heroColorInput.value = '#ffffff';
    save();
  });
  const heroDrop = document.getElementById('hero-img-drop');
  heroDrop.addEventListener('dragover', (e) => { e.preventDefault(); heroDrop.classList.add('dragover'); });
  heroDrop.addEventListener('dragleave', () => heroDrop.classList.remove('dragover'));
  heroDrop.addEventListener('drop', (e) => {
    e.preventDefault(); e.stopPropagation(); heroDrop.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) { const r = new FileReader(); r.onload = (ev) => { resizeImage(ev.target.result, 1200, (c) => { heroImage = c; save(); if (currentStorymapId) generateThumbnail(c, (t) => updateIndexEntry(currentStorymapId, { heroImageThumb: t })); renderSections(); }); }; r.readAsDataURL(file); }
  });
  document.getElementById('hero-img-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) { const r = new FileReader(); r.onload = (ev) => { resizeImage(ev.target.result, 1200, (c) => { heroImage = c; save(); if (currentStorymapId) generateThumbnail(c, (t) => updateIndexEntry(currentStorymapId, { heroImageThumb: t })); renderSections(); }); }; r.readAsDataURL(file); }
  });
  const heroRemoveBtn = document.getElementById('hero-img-remove');
  if (heroRemoveBtn) heroRemoveBtn.addEventListener('click', (e) => { e.stopPropagation(); heroImage = ''; save(); if (currentStorymapId) updateIndexEntry(currentStorymapId, { heroImageThumb: '' }); renderSections(); });

  sections.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'section-card' + (i === activeIdx ? ' active' : '');
    card.draggable = false;
    card.dataset.idx = i;
    const hasLoc = s.lat != null;
    card.innerHTML = `
      <div class="section-card-header">
        <span class="num">${i + 1}</span>
        <div class="section-card-actions">
          <button class="btn btn-ghost move-up" data-i="${i}" ${i === 0 ? 'disabled' : ''}>&#9650;</button>
          <button class="btn btn-ghost move-down" data-i="${i}" ${i === sections.length - 1 ? 'disabled' : ''}>&#9660;</button>
          <button class="btn btn-danger del-btn" data-i="${i}">&times;</button>
        </div>
      </div>
      <input type="text" placeholder="Section title" value="${esc(s.title)}" data-field="title" data-i="${i}" ${i !== activeIdx ? 'readonly' : ''}>
      <textarea placeholder="Section content…" data-field="body" data-i="${i}" ${i !== activeIdx ? 'readonly' : ''}>${esc(s.body)}</textarea>
      <div class="img-drop" data-i="${i}">
        ${s.image ? `<img class="thumb" src="${s.image}"><button class="remove-img" data-i="${i}" title="Remove image"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>` : 'Drop image here or click to upload'}
        <input type="file" accept="image/*" data-i="${i}">
      </div>
      <div class="section-loc ${hasLoc ? 'set' : ''}">
        ${hasLoc ? `📍 ${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}` : 'Click map to set location →'}
      </div>
    `;
    // Select on click (allow selecting when clicking inactive section's inputs)
    card.addEventListener('click', (e) => {
      if (e.target.closest('button') || e.target.closest('.img-drop')) return;
      if (i === activeIdx && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      activeIdx = i;
      renderSections();
      if (hasLoc && editMap) editMap.flyTo([s.lat, s.lng], mapZoom);
    });
    list.appendChild(card);
  });

  // Event delegation for inputs
  list.querySelectorAll('input[data-field], textarea[data-field]').forEach(el => {
    el.addEventListener('input', (e) => {
      const idx = parseInt(e.target.dataset.i);
      sections[idx][e.target.dataset.field] = e.target.value;
      save();
    });
  });
  list.querySelectorAll('.del-btn').forEach(el => {
    el.addEventListener('click', () => {
      if (!confirm('Delete this section?')) return;
      const idx = parseInt(el.dataset.i);
      sections.splice(idx, 1);
      if (activeIdx >= sections.length) activeIdx = Math.max(0, sections.length - 1);
      save(); renderSections(); renderEditMarkers();
    });
  });
  list.querySelectorAll('.move-up').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.i);
      [sections[idx - 1], sections[idx]] = [sections[idx], sections[idx - 1]];
      activeIdx = idx - 1;
      save(); renderSections(); renderEditMarkers();
    });
  });
  list.querySelectorAll('.move-down').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.i);
      [sections[idx], sections[idx + 1]] = [sections[idx + 1], sections[idx]];
      activeIdx = idx + 1;
      save(); renderSections(); renderEditMarkers();
    });
  });
  // Image drop zones (section cards only; hero has its own handlers)
  list.querySelectorAll('.img-drop[data-i]').forEach(drop => {
    const idx = parseInt(drop.dataset.i);
    drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', (e) => {
      e.preventDefault(); e.stopPropagation(); drop.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleImageFile(file, idx);
    });
    const fileInput = drop.querySelector('input[type=file]');
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleImageFile(file, idx);
    });
  });
  list.querySelectorAll('.remove-img[data-i]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(el.dataset.i);
      sections[idx].image = '';
      save(); renderSections();
    });
  });
}

function handleImageFile(file, idx) {
  const reader = new FileReader();
  reader.onload = (e) => {
    resizeImage(e.target.result, 1200, (compressed) => {
      sections[idx].image = compressed;
      activeIdx = idx;
      save(); renderSections();
    });
  };
  reader.readAsDataURL(file);
}

function renderEditMarkers() {
  if (!editMap) return;
  editMarkers.forEach(m => editMap.removeLayer(m));
  editMarkers = [];
  sections.forEach((s, i) => {
    if (s.lat == null) return;
    const icon = L.divIcon({ className: '', html: `<div class="numbered-marker ${i === activeIdx ? 'active-marker' : ''}">${i + 1}</div>`, iconSize: [26, 26], iconAnchor: [13, 13] });
    const m = L.marker([s.lat, s.lng], { icon }).addTo(editMap);
    m.on('click', () => { activeIdx = i; renderSections(); renderEditMarkers(); if (editMap) editMap.flyTo([s.lat, s.lng], mapZoom); });
    editMarkers.push(m);
  });
}

function esc(str) { return (str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ── Add section ──
document.getElementById('btn-add').addEventListener('click', () => {
  sections.push({ title: '', body: '', image: '', lat: null, lng: null, zoom: 10 });
  activeIdx = sections.length - 1;
  save(); renderSections(); renderEditMarkers();
  // Scroll to new card
  const list = document.getElementById('section-list');
  list.scrollTop = list.scrollHeight;
});

// ── Title ──
document.getElementById('story-title').addEventListener('input', (e) => { storyTitle = e.target.value; save(); renderSections(); });

// ── Mode switching ──
document.getElementById('btn-preview').addEventListener('click', () => enterPreview());
document.getElementById('btn-edit').addEventListener('click', () => enterEdit());

function enterPreview() {
  mode = 'preview';
  document.getElementById('edit-mode').style.display = 'none';
  document.getElementById('preview-mode').style.display = 'block';
  applyPaletteToPreview();
  document.getElementById('btn-preview').style.display = 'none';
  document.getElementById('btn-edit').style.display = '';

  // Build hero fullpage
  const heroEl = document.getElementById('hero-fullpage');
  heroEl.className = '';
  heroEl.style.backgroundImage = '';
  const heroTitleStyle = heroTextColor ? ` style="color:${esc(heroTextColor)}"` : '';
  const heroSubtitleStyle = heroTextColor ? ` style="color:${esc(heroTextColor)}"` : '';
  heroEl.innerHTML = `<h1${heroTitleStyle}>${esc(storyTitle)}</h1><p${heroSubtitleStyle}>${esc(heroSubtitle)}</p><div class="scroll-hint">Scroll to explore<span>&#x25BC;</span></div>`;
  if (heroImage) {
    heroEl.classList.add('has-bg');
    heroEl.style.backgroundImage = `url(${heroImage})`;
  }

  // Build narrative
  const narrative = document.getElementById('narrative');
  narrative.innerHTML = '';

  // Build image stack (right side)
  const imgPanel = document.getElementById('preview-right');
  imgPanel.innerHTML = '';

  sections.forEach((s, i) => {
    // Narrative text
    const div = document.createElement('div');
    div.className = 'story-section';
    div.dataset.idx = i;
    div.innerHTML = `
      <h2>${i + 1}. ${esc(s.title) || 'Untitled'}</h2>
      <p>${(s.body || '').replace(/\n/g, '<br>')}</p>
    `;
    narrative.appendChild(div);

    // Image in right panel
    if (s.image) {
      const img = document.createElement('img');
      img.src = s.image;
      img.dataset.idx = i;
      img.onerror = () => img.style.display = 'none';
      imgPanel.appendChild(img);
    }
  });

  // Init preview map
  setTimeout(() => {
    if (previewMap) previewMap.remove();
    previewMap = L.map('map-preview', { zoomControl: true, scrollWheelZoom: false }).setView([20, 0], 2);
    L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(previewMap);

    // Add markers
    sections.forEach((s, i) => {
      if (s.lat == null) return;
      const icon = L.divIcon({ className: '', html: `<div class="numbered-marker" id="pm-${i}">${i + 1}</div>`, iconSize: [26, 26], iconAnchor: [13, 13] });
      L.marker([s.lat, s.lng], { icon }).addTo(previewMap);
    });

    // Sync zoom from map controls back to mapZoom
    previewMap.on('zoomend', () => {
      mapZoom = previewMap.getZoom();
      if (currentStorymapId) save();
    });

    const first = sections.find(s => s.lat != null);
    if (first) previewMap.setView([first.lat, first.lng], mapZoom);

    // Scroll-based: pick section whose center is closest to viewport center (reliable for scroll-up)
    const scrollRoot = document.getElementById('preview-mode');
    let lastActiveIdx = -1;
    const updateActiveSection = () => {
      const sectionEls = narrative.querySelectorAll('.story-section[data-idx]');
      const rootRect = scrollRoot.getBoundingClientRect();
      const viewportCenterY = rootRect.top + rootRect.height / 2;

      let best = null;
      let bestDist = Infinity;
      sectionEls.forEach(el => {
        const rect = el.getBoundingClientRect();
        const centerY = rect.top + rect.height / 2;
        const dist = Math.abs(centerY - viewportCenterY);
        if (dist < bestDist) {
          bestDist = dist;
          best = el;
        }
      });
      if (!best) return;
      const idx = parseInt(best.dataset.idx);
      if (isNaN(idx)) return;
      if (idx === lastActiveIdx) return;
      lastActiveIdx = idx;
      const s = sections[idx];

      narrative.querySelectorAll('.story-section').forEach(el => el.classList.add('dim'));
      best.classList.remove('dim');
      if (s.lat != null) previewMap.flyTo([s.lat, s.lng], mapZoom, { duration: 0.7, easeLinearity: 0.5 });
      document.querySelectorAll('.numbered-marker').forEach(el => el.classList.remove('active-marker'));
      const pm = document.getElementById('pm-' + idx);
      if (pm) pm.classList.add('active-marker');
      imgPanel.querySelectorAll('img').forEach(img => img.classList.remove('active-img'));
      const activeImg = imgPanel.querySelector(`img[data-idx="${idx}"]`);
      if (activeImg) activeImg.classList.add('active-img');
    };

    scrollRoot.addEventListener('scroll', updateActiveSection, { passive: true });
    updateActiveSection();
  }, 100);
}

function enterEdit() {
  mode = 'edit';
  document.getElementById('edit-mode').style.display = 'flex';
  document.getElementById('preview-mode').style.display = 'none';
  document.getElementById('btn-preview').style.display = '';
  document.getElementById('btn-edit').style.display = 'none';
  if (previewMap) { previewMap.remove(); previewMap = null; }
  if (editMap) setTimeout(() => editMap.invalidateSize(), 100);
}

// ── Export ──
document.getElementById('btn-export').addEventListener('click', () => {
  const html = generateExport();
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (storyTitle || 'storymap').replace(/[^a-z0-9]/gi, '_') + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
});
