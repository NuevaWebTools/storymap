<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryMap Builder</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --ed-bg: #FAF5EF; --ed-panel: #F2E8DD; --ed-card: #FFF9F3; --ed-border: #D6C4B0;
  --ed-accent: #A65E2E; --ed-accent-hover: #8B4F26; --ed-secondary: #C49A6C; --ed-secondary-hover: #B08858;
  --ed-text: #2A1F18; --ed-muted: #7A6555; --ed-placeholder: #B0A090;
  --ed-danger: #C0503A; --ed-danger-hover: #A3422F; --ed-success: #5B8A5E;
  --ed-hint-bg: rgba(42,31,24,.8);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; background: var(--ed-bg); color: var(--ed-text); }

/* ── Toolbar ── */
#toolbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--ed-panel); border-bottom: 1px solid var(--ed-border); min-height: 48px; z-index: 1000; flex-wrap: wrap; }
#toolbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
/* Design drawer */
#design-drawer { position: absolute; top: 0; right: 0; width: 300px; height: 100%; background: var(--ed-panel); border-left: 1px solid var(--ed-border); z-index: 900; transform: translateX(100%); transition: transform .25s ease; overflow-y: auto; display: flex; flex-direction: column; }
#design-drawer.open { transform: translateX(0); }
.drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--ed-border); }
.drawer-header h2 { font-size: 15px; font-weight: 600; color: var(--ed-text); }
.drawer-close { background: transparent; border: 1px solid var(--ed-border); color: var(--ed-muted); width: 28px; height: 28px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background .2s, color .2s; }
.drawer-close:hover { background: var(--ed-bg); color: var(--ed-text); }
.drawer-body { padding: 16px; flex: 1; }
.drawer-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--ed-muted); margin-bottom: 10px; font-weight: 600; }
#palette-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.palette-btn { display: flex; align-items: center; justify-content: center; padding: 14px 10px; border: 2px solid var(--ed-border); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: border-color .2s, box-shadow .2s; }
.palette-btn:hover { border-color: var(--ed-accent); box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.palette-btn.active { border-color: var(--ed-accent); box-shadow: 0 0 0 1px var(--ed-accent); }
#layout-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.layout-btn { display: flex; flex-direction: column; align-items: stretch; padding: 0; border: 2px solid var(--ed-border); border-radius: 8px; background: var(--ed-card); cursor: pointer; transition: border-color .2s, box-shadow .2s; overflow: hidden; }
.layout-btn:hover { border-color: var(--ed-accent); box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.layout-btn.active { border-color: var(--ed-accent); box-shadow: 0 0 0 1px var(--ed-accent); }
.layout-btn .layout-preview { height: 60px; display: flex; gap: 2px; padding: 6px; background: var(--ed-bg); }
.layout-btn .lp-block { border-radius: 3px; }
.layout-btn .layout-label { font-size: 11px; font-weight: 600; color: var(--ed-text); padding: 6px 8px; text-align: center; }
#cover-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cover-btn { display: flex; flex-direction: column; align-items: stretch; padding: 0; border: 2px solid var(--ed-border); border-radius: 8px; background: var(--ed-card); cursor: pointer; transition: border-color .2s, box-shadow .2s; overflow: hidden; }
.cover-btn:hover { border-color: var(--ed-accent); box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.cover-btn.active { border-color: var(--ed-accent); box-shadow: 0 0 0 1px var(--ed-accent); }
.cover-btn .cover-preview { height: 56px; position: relative; background: var(--ed-bg); overflow: hidden; }
.cover-btn .cover-label { font-size: 11px; font-weight: 600; color: var(--ed-text); padding: 6px 8px; text-align: center; }
#toolbar #story-title { background: var(--ed-card); border: 1px solid var(--ed-border); color: var(--ed-text); padding: 4px 10px; border-radius: 4px; font-size: 16px; font-weight: 600; flex: 1; min-width: 120px; max-width: 400px; cursor: text; }
#toolbar #story-title:focus { border-color: var(--ed-accent); outline: none; }
#toolbar #story-title:focus::placeholder { color: transparent; }
.btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background .2s; }
.btn-primary { background: var(--ed-accent); color: var(--ed-card); }
.btn-primary:hover { background: var(--ed-accent-hover); }
.btn-secondary { background: var(--ed-secondary); color: var(--ed-text); }
.btn-secondary:hover { background: var(--ed-secondary-hover); }
.btn-ghost { background: transparent; color: var(--ed-muted); border: 1px solid var(--ed-border); }
.btn-ghost:hover { background: var(--ed-panel); color: var(--ed-text); }
.btn-danger { background: var(--ed-danger); color: var(--ed-card); }
.btn-danger:hover { background: var(--ed-danger-hover); }

/* ── Edit Mode ── */
#edit-mode { display: flex; height: calc(100vh - 48px); }
#section-panel { width: 55%; min-width: 400px; overflow-y: auto; background: var(--ed-panel); border-right: 1px solid var(--ed-border); display: flex; flex-direction: column; }
#section-list { flex: 1; overflow-y: auto; padding: 8px; }
#add-section-bar { padding: 10px; border-top: 1px solid var(--ed-border); }
#map-edit-container { flex: 1; position: relative; overflow: hidden; }
#map-edit { height: 100%; width: 100%; background: var(--ed-bg); }
.map-hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: var(--ed-hint-bg); color: var(--ed-card); padding: 6px 14px; border-radius: 20px; font-size: 12px; z-index: 800; pointer-events: none; }
#map-mode-bar { padding: 12px; border-bottom: 1px solid var(--ed-border); }
.map-mode-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; background: var(--ed-card); border: 2px solid var(--ed-border); border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 600; color: var(--ed-text); transition: border-color .2s, background .2s; }
.map-mode-toggle:hover { border-color: var(--ed-accent); background: var(--ed-bg); }
.map-mode-toggle.active { border-color: var(--ed-accent); background: var(--ed-accent); color: var(--ed-card); }
.map-mode-toggle input[type=checkbox] { accent-color: var(--ed-accent); width: 18px; height: 18px; }
#custom-map-upload { margin-top: 8px; }
#custom-map-upload .img-drop { background: var(--ed-bg); border: 2px dashed var(--ed-border); border-radius: 6px; padding: 16px; text-align: center; cursor: pointer; font-size: 13px; color: var(--ed-muted); position: relative; }
#custom-map-upload .img-drop:hover, #custom-map-upload .img-drop.dragover { border-color: var(--ed-accent); background: rgba(0,0,0,.03); }
#custom-map-upload .img-drop input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
#custom-map-upload .custom-map-actions { display: flex; gap: 8px; padding: 4px 0; }

/* Hero card */
.hero-card { background: var(--ed-card); border: 1px solid var(--ed-border); border-top: 3px solid var(--ed-accent); border-radius: 6px; padding: 14px; margin-bottom: 14px; transition: opacity .2s, filter .2s; opacity: 0.45; filter: grayscale(30%); cursor: pointer; }
.hero-card.active { opacity: 1; filter: none; }
.hero-card .hero-label { display: flex; align-items: center; gap: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--ed-accent); margin-bottom: 10px; font-weight: 700; }
.hero-card .hero-label svg { width: 14px; height: 14px; fill: var(--ed-accent); flex-shrink: 0; }
.hero-card input, .hero-card textarea { width: 100%; background: var(--ed-bg); border: 1px solid var(--ed-border); color: var(--ed-text); padding: 6px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 6px; font-family: inherit; }
.hero-card textarea { resize: vertical; min-height: 40px; }
.hero-card input::placeholder, .hero-card textarea::placeholder { color: var(--ed-placeholder); font-style: italic; }
.hero-card input:focus::placeholder, .hero-card textarea:focus::placeholder { color: transparent; }
.hero-card input[readonly], .hero-card textarea[readonly] { cursor: default; }
.hero-color-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.hero-color-row label { font-size: 12px; color: var(--ed-muted); }
.hero-color-row input[type=color] { width: 36px; height: 28px; padding: 2px; border: 1px solid var(--ed-border); border-radius: 4px; cursor: pointer; background: var(--ed-bg); }
.hero-color-row .hero-color-reset { font-size: 11px; color: var(--ed-muted); cursor: pointer; text-decoration: underline; }
.hero-color-row .hero-color-reset:hover { color: var(--ed-accent); }

/* Section cards */
.section-card { background: var(--ed-card); border: 1px solid var(--ed-border); border-radius: 6px; padding: 12px; margin-bottom: 8px; transition: border-color .2s, opacity .2s, filter .2s; opacity: 0.45; filter: grayscale(30%); }
.section-card.active { border-color: var(--ed-accent); opacity: 1; filter: none; }
.section-card.dragging { opacity: 0.4; }
.section-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.section-card-header .num { background: var(--ed-accent); color: var(--ed-card); width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.section-card input, .section-card textarea { width: 100%; background: var(--ed-bg); border: 1px solid var(--ed-border); color: var(--ed-text); padding: 6px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 6px; font-family: inherit; }
.section-card textarea { resize: vertical; min-height: 60px; }
.section-card input::placeholder, .section-card textarea::placeholder { color: var(--ed-placeholder); }
.section-card input:focus::placeholder, .section-card textarea:focus::placeholder { color: transparent; }
.section-card input[readonly], .section-card textarea[readonly] { cursor: default; }
.img-drop { border: 2px dashed var(--ed-border); border-radius: 6px; padding: 12px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; margin-bottom: 6px; font-size: 12px; color: var(--ed-muted); position: relative; }
.img-drop:hover, .img-drop.dragover { border-color: var(--ed-accent); background: rgba(0,0,0,.03); }
.img-drop input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 5; }
.img-drop.has-image input[type=file] { pointer-events: none; }
.img-drop .thumb { max-width: 100%; max-height: 120px; border-radius: 4px; margin-bottom: 6px; display: block; }
.img-drop .remove-img { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.75); color: #fff; border: 1px solid rgba(255,255,255,.4); border-radius: 4px; width: 28px; height: 28px; padding: 0; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: background .2s; }
.img-drop .remove-img:hover { background: var(--ed-danger); border-color: var(--ed-danger); }
.img-drop .remove-img svg { width: 14px; height: 14px; fill: currentColor; }
.section-loc { font-size: 12px; color: var(--ed-accent); margin-top: 6px; font-weight: 600; padding: 4px 8px; background: color-mix(in srgb, var(--ed-accent) 12%, transparent); border-radius: 4px; text-align: center; }
.section-loc.set { color: var(--ed-success); font-weight: 400; background: transparent; text-align: left; font-size: 11px; padding: 0; margin-top: 4px; }
.section-card-actions { display: flex; gap: 6px; }
.section-card-actions .btn { padding: 3px 8px; font-size: 11px; }

/* ── Preview Mode ── */
#preview-mode {
  --palette-accent: #A65E2E;
  --palette-bg: #faf5ef;
  --palette-bg-dark: #f2e8dd;
  --palette-bg-secondary: #e8ddd0;
  --palette-border: #d6c4b0;
  --palette-secondary: #C49A6C;
  --palette-text: #2A1F18;
  --palette-text-muted: #7A6555;
  --palette-control-text: #2A1F18;
}
#preview-mode { display: none; height: calc(100vh - 48px); overflow-y: auto; background: var(--palette-bg); }
#preview-mode #hero-fullpage { width: 100%; height: calc(100vh - 48px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: var(--palette-bg); background-size: cover; background-position: center; position: relative; }
#preview-mode #hero-fullpage.has-bg::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,.55); }
#preview-mode #hero-fullpage h1 { position: relative; z-index: 1; font-size: 48px; color: var(--palette-accent); text-shadow: 0 2px 12px rgba(0,0,0,.7); margin-bottom: 16px; }
#preview-mode #hero-fullpage p { position: relative; z-index: 1; font-size: 20px; color: var(--palette-text-muted); text-shadow: 0 1px 6px rgba(0,0,0,.6); max-width: 600px; line-height: 1.6; }
#preview-mode #hero-fullpage .scroll-hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1; font-size: 13px; color: #888; letter-spacing: 1px; text-align: center; }
#preview-mode #hero-fullpage .scroll-hint span { display: block; margin-top: 6px; animation: bounce 2s infinite; font-size: 20px; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }

/* ── Cover: Side (editorial — text top-left, image below) ── */
#preview-mode #hero-fullpage.hero-side { align-items: flex-start; justify-content: flex-start; text-align: left; padding: 60px 60px 0; background-size: contain; background-position: bottom center; background-repeat: no-repeat; }
#preview-mode #hero-fullpage.hero-side.has-bg::before { display: none; }
#preview-mode #hero-fullpage.hero-side h1 { font-size: 52px; font-weight: 900; color: var(--palette-text); text-shadow: none; max-width: 700px; }
#preview-mode #hero-fullpage.hero-side p { color: var(--palette-text-muted); text-shadow: none; font-size: 18px; max-width: 600px; }
#preview-mode #hero-fullpage.hero-side .scroll-hint { color: var(--palette-text-muted); }

/* ── Cover: Bold (full image, text bottom-left, minimal overlay) ── */
#preview-mode #hero-fullpage.hero-bold { align-items: flex-start; justify-content: flex-end; text-align: left; padding: 0 60px 60px; }
#preview-mode #hero-fullpage.hero-bold.has-bg::before { background: linear-gradient(to top, rgba(0,0,0,.7) 0%, rgba(0,0,0,.2) 40%, transparent 70%); }
#preview-mode #hero-fullpage.hero-bold h1 { font-size: 56px; font-weight: 900; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,.8); max-width: 700px; }
#preview-mode #hero-fullpage.hero-bold p { color: rgba(255,255,255,.85); text-shadow: 0 1px 8px rgba(0,0,0,.6); font-size: 18px; max-width: 600px; }
#preview-mode #hero-fullpage.hero-bold .scroll-hint { color: rgba(255,255,255,.6); }
#preview-mode #story-body { display: flex; align-items: flex-start; min-height: calc(100vh - 48px); background: var(--palette-bg); }
#preview-mode #preview-left { width: 35%; background: var(--palette-bg); padding: 16px; }
#preview-mode #map-preview { position: sticky; top: 16px; width: 100%; height: 35vh; border-bottom: 1px solid var(--palette-border); z-index: 10; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
#preview-mode #narrative { width: 100%; }
#preview-mode #preview-right { position: sticky; top: 0; width: 65%; height: calc(100vh - 48px); display: flex; align-items: center; justify-content: center; background: var(--palette-bg-dark); overflow: hidden; }
#preview-mode #preview-right img { position: absolute; width: 100%; height: 100%; object-fit: contain; border-radius: 10px; transition: opacity 1.2s ease; opacity: 0; }
#preview-mode #preview-right img.active-img { opacity: 1; }
#preview-mode .story-section { min-height: 60vh; display: flex; flex-direction: column; justify-content: center; padding: 40px 30px; transition: opacity .4s; }
#preview-mode .story-section.dim { opacity: 0.25; }
#preview-mode .story-section h2 { font-size: 26px; color: var(--palette-accent); margin-bottom: 14px; }
#preview-mode .story-section p { font-size: 15px; line-height: 1.7; color: var(--palette-text-muted); }
#preview-mode .numbered-marker { background: var(--palette-accent); color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
#preview-mode .numbered-marker.active-marker { background: #fff; color: var(--palette-accent); transform: scale(1.3); }
#preview-mode .leaflet-control-zoom a { background: var(--palette-bg-secondary) !important; color: var(--palette-control-text) !important; border-color: var(--palette-border) !important; }
#preview-mode .leaflet-control-zoom a:hover { background: var(--palette-border) !important; color: var(--palette-control-text) !important; }
#preview-mode::-webkit-scrollbar { width: 6px; }
#preview-mode::-webkit-scrollbar-track { background: var(--palette-bg); }
#preview-mode::-webkit-scrollbar-thumb { background: var(--palette-secondary); border-radius: 3px; }

/* ── Layout: Reverse (image left, map+text right) ── */
#preview-mode.layout-reverse #story-body { flex-direction: row-reverse; }
#preview-mode.layout-reverse #preview-left { width: 35%; }
#preview-mode.layout-reverse #preview-right { width: 65%; }

/* ── Layout: Immersive (full-screen map, floating narrative) ── */
#preview-mode.layout-immersive #story-body { display: block; position: relative; min-height: auto; }
#preview-mode.layout-immersive #preview-left { width: 100%; padding: 0; position: relative; z-index: 2; pointer-events: none; }
#preview-mode.layout-immersive #map-preview { position: sticky; top: 0; left: 0; width: 100%; height: calc(100vh - 48px); z-index: 1; border-radius: 0; margin: 0; border: none; pointer-events: auto; }
#preview-mode.layout-immersive #narrative { position: relative; z-index: 2; max-width: 420px; margin-left: 40px; margin-top: calc(-100vh + 48px); padding-top: 40vh; padding-bottom: 40vh; }
#preview-mode.layout-immersive .story-section { background: var(--palette-bg); border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.25); padding: 30px; margin-bottom: 60vh; min-height: auto; pointer-events: auto; }
#preview-mode.layout-immersive .story-section.dim { opacity: 0.7; }
#preview-mode.layout-immersive .story-section .section-inline-img { width: 100%; border-radius: 6px; margin-top: 12px; }
#preview-mode.layout-immersive #preview-right { display: none; }

/* Scrollbar (edit mode) */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--ed-bg); }
::-webkit-scrollbar-thumb { background: var(--ed-secondary); border-radius: 3px; }

/* Number markers on map (edit mode) */
.numbered-marker { background: var(--ed-accent); color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.3); }
.numbered-marker.active-marker { background: #fff; color: var(--ed-accent); transform: scale(1.3); }

/* Leaflet zoom control styling (edit mode) */
.leaflet-control-zoom a { background: var(--ed-panel) !important; color: var(--ed-text) !important; border-color: var(--ed-border) !important; }
.leaflet-control-zoom a:hover { background: var(--ed-border) !important; color: var(--ed-text) !important; }

/* ── Landing Page ── */
#landing-page { height: 100vh; background: var(--ed-bg); padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
#landing-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
#landing-header h1 { font-size: 28px; font-weight: 700; color: var(--ed-accent); }
#storymap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; align-content: start; flex: 1; }
.storymap-card { background: var(--ed-card); border: 1px solid var(--ed-border); border-radius: 8px; overflow: hidden; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.storymap-card:hover { border-color: var(--ed-accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.storymap-card-thumb { width: 100%; height: 160px; background: var(--ed-panel); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.storymap-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.storymap-card-thumb .placeholder-icon { font-size: 48px; color: var(--ed-secondary); }
.storymap-card-body { padding: 14px; }
.storymap-card-body h3 { font-size: 16px; color: var(--ed-text); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.storymap-card-meta { font-size: 12px; color: var(--ed-muted); margin-bottom: 12px; }
.storymap-card-actions { display: flex; gap: 8px; }
.storymap-card.create-new { border-style: dashed; border-color: var(--ed-secondary); display: flex; align-items: center; justify-content: center; min-height: 240px; }
.storymap-card.create-new:hover { border-color: var(--ed-accent); background: rgba(0,0,0,.02); }
.create-new-content { text-align: center; color: var(--ed-muted); }
.create-new-content .plus { font-size: 48px; color: var(--ed-accent); display: block; margin-bottom: 8px; }
#btn-back { background: transparent; border: 1px solid var(--ed-border); color: var(--ed-muted); padding: 6px 10px; border-radius: 4px; cursor: pointer; transition: background .2s, color .2s; display: inline-flex; align-items: center; justify-content: center; }
#btn-back:hover { background: var(--ed-panel); color: var(--ed-text); }
#btn-back svg { width: 18px; height: 18px; fill: currentColor; }
#landing-footer { margin-top: auto; padding-top: 24px; border-top: 1px solid var(--ed-border); text-align: center; font-size: 13px; color: var(--ed-muted); line-height: 1.6; flex-shrink: 0; }
#landing-footer a { color: var(--ed-accent); text-decoration: none; }
#landing-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- LANDING PAGE -->
<div id="landing-page">

// ── IndexedDB Storage (replaces localStorage for much larger capacity) ──
const DB_NAME = 'storymap-db';
const DB_VERSION = 1;
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { _db = req.result; resolve(_db); };
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('index')) db.createObjectStore('index');
      if (!db.objectStoreNames.contains('storymaps')) db.createObjectStore('storymaps', { keyPath: 'id' });
    };
  });
}

async function dbGet(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(storeName, value, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = key !== undefined ? store.put(value, key) : store.put(value);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function dbDelete(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ── ID & Thumbnail Utilities ──
function generateId() {
  return 'sm_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
}

function generateThumbnail(dataUrl, callback) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    // 400x240 matches card thumb display (~280x160) at ~1.4x for crisp rendering
    canvas.width = 400; canvas.height = 240;
    canvas.getContext('2d').drawImage(img, 0, 0, 400, 240);
    callback(canvas.toDataURL('image/jpeg', 0.75));
  };
  img.src = dataUrl;
}

// ── Index Management (async IndexedDB) ──
async function loadIndex() {
  const arr = await dbGet('index', 'index');
  return Array.isArray(arr) ? arr : [];
}

async function saveIndex(index) {
  await dbPut('index', index, 'index');
}

async function updateIndexEntry(id, updates) {
  const index = await loadIndex();
  const entry = index.find(e => e.id === id);
  if (entry) {
    Object.assign(entry, updates, { lastEdited: Date.now() });
    await saveIndex(index);
  }
}

async function removeFromIndex(id) {
  const index = await loadIndex();
  await saveIndex(index.filter(e => e.id !== id));
}

// ── Per-Storymap Load / Save ──
async function loadStorymap(id) {
  const doc = await dbGet('storymaps', id);
  if (doc) {
    sections = doc.sections || [];
    storyTitle = doc.title || '';
    heroSubtitle = doc.heroSubtitle || '';
    heroImage = doc.heroImage || '';
    heroTextColor = doc.heroTextColor || '';
    mapZoom = parseInt(doc.zoom || '8');
    customMapZoom = doc.customZoom != null ? doc.customZoom : 2;
    paletteId = doc.palette || 'cabin';
    useCustomMap = doc.useCustomMap || false;
    customMapImage = doc.customMapImage || '';
    layoutId = doc.layout || 'classic';
    coverId = doc.cover || 'center';
  } else {
    sections = [];
    storyTitle = '';
    heroSubtitle = '';
    heroImage = '';
    heroTextColor = '';
    mapZoom = 8;
    customMapZoom = 2;
    paletteId = 'cabin';
    useCustomMap = false;
    customMapImage = '';
    layoutId = 'classic';
    coverId = 'center';
  }
  if (!PALETTES[paletteId]) paletteId = 'cabin';
  if (!LAYOUTS[layoutId]) layoutId = 'classic';
  if (!COVERS[coverId]) coverId = 'center';
  currentStorymapId = id;
}

async function deleteStorymapData(id) {
  await dbDelete('storymaps', id);
  await removeFromIndex(id);
}

async function save() {
  if (!currentStorymapId) return;
  try {
    await dbPut('storymaps', {
      id: currentStorymapId,
      sections,
      title: storyTitle,
      heroSubtitle,
      heroImage,
      heroTextColor,
      zoom: mapZoom,
      customZoom: customMapZoom,
      palette: paletteId,
      useCustomMap,
      customMapImage,
      layout: layoutId,
      cover: coverId
    });
    await updateIndexEntry(currentStorymapId, { title: storyTitle });
  } catch (e) {
    console.warn('IndexedDB save failed:', e);
    alert('Storage error. Try deleting old storymaps or clearing site data.');
  }
}

// ── Migration: localStorage → IndexedDB ──
async function migrateIfNeeded() {
  await openDB();
  const lsIndex = localStorage.getItem('storymap-index');
  if (lsIndex) {
    let index;
    try { index = JSON.parse(lsIndex); } catch (_) { return; }
    if (!Array.isArray(index)) return;
    for (const entry of index) {
      const p = 'storymap:' + entry.id + ':';
      const doc = {
        id: entry.id,
        sections: JSON.parse(localStorage.getItem(p + 'sections') || '[]'),
        title: localStorage.getItem(p + 'title') || '',
        heroSubtitle: localStorage.getItem(p + 'hero-subtitle') || '',
        heroImage: localStorage.getItem(p + 'hero-image') || '',
        heroTextColor: localStorage.getItem(p + 'hero-text-color') || '',
        zoom: parseInt(localStorage.getItem(p + 'zoom') || '8'),
        palette: localStorage.getItem(p + 'palette') || 'cabin'
      };
      await dbPut('storymaps', doc);
    }
    await saveIndex(index);
    index.forEach(e => {
      const p = 'storymap:' + e.id + ':';
      ['sections', 'title', 'hero-subtitle', 'hero-image', 'hero-text-color', 'zoom', 'palette'].forEach(k => localStorage.removeItem(p + k));
    });
    localStorage.removeItem('storymap-index');
  }
  const oldSections = localStorage.getItem('storymap-sections');
  if (oldSections) {
    const id = generateId();
    const doc = {
      id,
      sections: JSON.parse(oldSections),
      title: localStorage.getItem('storymap-title') || '',
      heroSubtitle: localStorage.getItem('storymap-hero-subtitle') || '',
      heroImage: localStorage.getItem('storymap-hero-image') || '',
      heroTextColor: localStorage.getItem('storymap-hero-text-color') || '',
      zoom: parseInt(localStorage.getItem('storymap-zoom') || '8'),
      palette: localStorage.getItem('storymap-palette') || 'cabin'
    };
    await dbPut('storymaps', doc);
    const img = doc.heroImage;
    const entry = { id, title: doc.title, heroImageThumb: '', lastEdited: Date.now(), createdAt: Date.now() };
    const index = await loadIndex();
    index.push(entry);
    await saveIndex(index);
    if (img) {
      generateThumbnail(img, async (thumb) => {
        const idx = await loadIndex();
        const e = idx.find(x => x.id === id);
        if (e) { e.heroImageThumb = thumb; await saveIndex(idx); }
        if (currentView === 'landing') await renderLanding();
      });
    }
    ['storymap-sections', 'storymap-title', 'storymap-hero-subtitle', 'storymap-hero-image', 'storymap-hero-text-color', 'storymap-zoom', 'storymap-palette'].forEach(k => localStorage.removeItem(k));
  }
}

// ── Landing Page ──
async function renderLanding() {
  const index = await loadIndex();
  const grid = document.getElementById('storymap-grid');
  grid.innerHTML = '';

  const createCard = document.createElement('div');
  createCard.className = 'storymap-card create-new';
  createCard.innerHTML = '<div class="create-new-content"><span class="plus">+</span><div>Create New StoryMap</div></div>';
  createCard.addEventListener('click', createNewStorymap);
  grid.appendChild(createCard);

  index.sort((a, b) => b.lastEdited - a.lastEdited);

  index.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'storymap-card';
    const dateStr = new Date(entry.lastEdited).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    card.innerHTML = `
      <div class="storymap-card-thumb">
        ${entry.heroImageThumb ? '<img src="' + entry.heroImageThumb + '" alt="">' : '<span class="placeholder-icon">&#x1F5FA;</span>'}
      </div>
      <div class="storymap-card-body">
        <h3>${esc(entry.title || 'Untitled')}</h3>
        <div class="storymap-card-meta">Last edited: ${dateStr}</div>
        <div class="storymap-card-actions">
          <button class="btn btn-primary btn-edit-map" data-id="${entry.id}">Edit</button>
          <button class="btn btn-danger btn-delete-map" data-id="${entry.id}">Delete</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.btn-edit-map').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); openStorymap(btn.dataset.id); });
  });
  grid.querySelectorAll('.btn-delete-map').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (confirm('Delete this storymap? This cannot be undone.')) { await deleteStorymapData(btn.dataset.id); renderLanding(); }
    });
  });
  grid.querySelectorAll('.storymap-card:not(.create-new)').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      const editBtn = card.querySelector('.btn-edit-map');
      if (editBtn) openStorymap(editBtn.dataset.id);
    });
  });
}

// ── Navigation ──
async function showLanding() {
  currentView = 'landing';
  currentStorymapId = null;
  document.body.style.overflow = 'auto';
  document.body.style.height = 'auto';
  document.getElementById('landing-page').style.display = 'flex';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('edit-mode').style.display = 'none';
  document.getElementById('preview-mode').style.display = 'none';
  if (editMap) { editMap.remove(); editMap = null; }
  if (previewMap) { previewMap.remove(); previewMap = null; }
  await renderLanding();
}

async function openStorymap(id) {
  await loadStorymap(id);
  currentView = 'edit';
  mode = 'edit';
  activeIdx = -1;
  document.body.style.overflow = 'hidden';
  document.body.style.height = '100vh';
  document.getElementById('landing-page').style.display = 'none';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('edit-mode').style.display = 'flex';
  document.getElementById('preview-mode').style.display = 'none';
  document.getElementById('btn-preview').style.display = '';
  document.getElementById('btn-edit').style.display = 'none';
  document.getElementById('story-title').value = storyTitle;
  document.getElementById('custom-map-toggle').checked = useCustomMap;
  document.querySelector('.map-mode-toggle').classList.toggle('active', useCustomMap);
  updateCustomMapUpload();
  initEditMap();
  renderPaletteBar();
  renderLayoutBar();
  renderCoverBar();
  applyPaletteToPreview();
  if (sections.length === 0) {
    sections.push({ title: 'Welcome', body: 'Click the map to set this section\'s location, then add more sections to build your story.', image: '', lat: null, lng: null, zoom: 10 });
    await save();
  }
  renderSections();
  renderEditMarkers();
}

function initEditMap() {
  if (editMap) editMap.remove();
  editMap = null;

  const hint = document.getElementById('map-hint');
  if (hint) hint.textContent = useCustomMap
    ? 'Select a section, then click the image to set its location'
    : 'Select a section, then click the map to set its location';

  if (useCustomMap && customMapImage) {
    const img = new Image();
    img.onload = () => {
      const bounds = [[0, 0], [img.height, img.width]];
      editMap = L.map('map-edit', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 5, zoomSnap: 0.25, attributionControl: false });
      L.imageOverlay(customMapImage, bounds).addTo(editMap);
      editMap.fitBounds(bounds, { padding: [0, 0] });
      editMap.setMaxBounds(bounds);
      editMap.on('click', function(e) {
        if (sections.length === 0 || activeIdx < 0) return;
        const s = sections[activeIdx];
        s.lat = e.latlng.lat;
        s.lng = e.latlng.lng;
        save();
        renderSections();
        renderEditMarkers();
      });
      editMap.on('zoomend', () => {
        customMapZoom = editMap.getZoom();
        save();
      });
      renderEditMarkers();
    };
    img.src = customMapImage;
  } else if (useCustomMap && !customMapImage) {
    editMap = L.map('map-edit', { crs: L.CRS.Simple, minZoom: -1, maxZoom: 1, attributionControl: false });
    editMap.setView([0, 0], 0);
  } else {
    editMap = L.map('map-edit').setView([20, 0], 2);
    L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(editMap);
    editMap.on('click', function(e) {
      if (sections.length === 0 || activeIdx < 0) return;
      const s = sections[activeIdx];
      s.lat = e.latlng.lat;
      s.lng = e.latlng.lng;
      save();
      renderSections();
      renderEditMarkers();
    });
    editMap.on('zoomend', () => {
      mapZoom = editMap.getZoom();
      save();
    });
  }
}

// ── Custom map toggle & upload ──
document.getElementById('custom-map-toggle').addEventListener('change', (e) => {
  const wasCustom = useCustomMap;
  useCustomMap = e.target.checked;
  const hasCoords = sections.some(s => s.lat != null);
  if (hasCoords && wasCustom !== useCustomMap) {
    if (!confirm('Switching map mode will clear all section locations (coordinates are not compatible between modes). Continue?')) {
      useCustomMap = wasCustom;
      e.target.checked = wasCustom;
      return;
    }
    sections.forEach(s => { s.lat = null; s.lng = null; });
  }
  save();
  e.target.closest('.map-mode-toggle').classList.toggle('active', useCustomMap);
  updateCustomMapUpload();
  initEditMap();
  renderSections();
  renderEditMarkers();
});

function updateCustomMapUpload() {
  const area = document.getElementById('custom-map-upload');
  if (useCustomMap && !customMapImage) {
    area.style.display = 'block';
    area.innerHTML = `
      <div class="img-drop" id="custom-map-drop">
        Drop your map image here or click to upload
        <input type="file" accept="image/*" id="custom-map-file">
      </div>`;
    const drop = document.getElementById('custom-map-drop');
    drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', (e) => {
      e.preventDefault(); e.stopPropagation(); drop.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleCustomMapFile(file);
    });
    document.getElementById('custom-map-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleCustomMapFile(file);
    });
  } else if (useCustomMap && customMapImage) {
    area.style.display = 'block';
    area.innerHTML = `
      <div class="custom-map-actions">
        <button class="btn btn-ghost" id="replace-custom-map">Replace image</button>
        <button class="btn btn-danger" id="remove-custom-map">Remove</button>
        <input type="file" accept="image/*" id="custom-map-file-replace" style="display:none">
      </div>`;
    document.getElementById('replace-custom-map').addEventListener('click', () => {
      document.getElementById('custom-map-file-replace').click();
    });
    document.getElementById('custom-map-file-replace').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleCustomMapFile(file);
    });
    document.getElementById('remove-custom-map').addEventListener('click', () => {
      customMapImage = '';
      sections.forEach(s => { s.lat = null; s.lng = null; });
      save();
      updateCustomMapUpload();
      initEditMap();
      renderSections();
      renderEditMarkers();
    });
  } else {
    area.style.display = 'none';
    area.innerHTML = '';
  }
}

function handleCustomMapFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    resizeImage(e.target.result, 2400, (compressed) => {
      customMapImage = compressed;
      save();
      updateCustomMapUpload();
      initEditMap();
      renderEditMarkers();
    });
  };
  reader.readAsDataURL(file);
}

// Resize image to fit within max dimensions and return compressed data URL
// IndexedDB allows larger storage, so we use 1200px and 0.7 quality for better image quality
function resizeImage(dataUrl, maxSize, callback) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxSize || h > maxSize) {
      if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
      else { w = Math.round(w * maxSize / h); h = maxSize; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.7));
  };
  img.src = dataUrl;
}

function handleImageFile(file, idx) {
  const reader = new FileReader();
  reader.onload = (e) => {
    resizeImage(e.target.result, 1200, (compressed) => {
      sections[idx].image = compressed;
      activeIdx = idx;
      save(); renderSections();
    });
  };
  reader.readAsDataURL(file);
}

function renderEditMarkers() {
  if (!editMap) return;
  editMarkers.forEach(m => editMap.removeLayer(m));
  editMarkers = [];
  sections.forEach((s, i) => {
    if (s.lat == null) return;
    const icon = L.divIcon({ className: '', html: `<div class="numbered-marker ${i === activeIdx ? 'active-marker' : ''}">${i + 1}</div>`, iconSize: [26, 26], iconAnchor: [13, 13] });
    const m = L.marker([s.lat, s.lng], { icon }).addTo(editMap);
    m.on('click', () => { activeIdx = i; renderSections(); renderEditMarkers(); if (editMap) editMap.flyTo([s.lat, s.lng], useCustomMap ? customMapZoom : mapZoom); });
    editMarkers.push(m);
  });
}

function esc(str) { return (str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function enterPreview() {
  mode = 'preview';
  document.getElementById('edit-mode').style.display = 'none';
  const previewEl = document.getElementById('preview-mode');
  previewEl.style.display = 'block';
  // Apply layout class
  previewEl.className = 'layout-' + layoutId;
  applyPaletteToPreview();
  document.getElementById('btn-preview').style.display = 'none';
  document.getElementById('btn-edit').style.display = '';
  document.getElementById('btn-design').style.display = 'none';
  document.getElementById('design-drawer').classList.remove('open');

  // Build hero fullpage
  const heroEl = document.getElementById('hero-fullpage');
  heroEl.className = '';
  heroEl.style.backgroundImage = '';
  const heroTitleStyle = heroTextColor ? ` style="color:${esc(heroTextColor)}"` : '';
  const heroSubtitleStyle = heroTextColor ? ` style="color:${esc(heroTextColor)}"` : '';

  heroEl.innerHTML = `<h1${heroTitleStyle}>${esc(storyTitle)}</h1><p${heroSubtitleStyle}>${esc(heroSubtitle)}</p><div class="scroll-hint">Scroll to explore<span>&#x25BC;</span></div>`;
  if (heroImage) {
    heroEl.classList.add('has-bg');
    heroEl.style.backgroundImage = `url(${heroImage})`;
  }
  // Apply cover style class
  const coverClassMap = { center: '', side: 'hero-side', bold: 'hero-bold' };
  if (coverClassMap[coverId]) heroEl.classList.add(coverClassMap[coverId]);

  // Build narrative
  const narrative = document.getElementById('narrative');
  narrative.innerHTML = '';

  // Build image stack (right side)
  const imgPanel = document.getElementById('preview-right');
  imgPanel.innerHTML = '';

  const useInlineImages = (layoutId === 'immersive');

  sections.forEach((s, i) => {
    // Narrative text
    const div = document.createElement('div');
    div.className = 'story-section';
    div.dataset.idx = i;
    let imgHtml = '';
    if (useInlineImages && s.image) {
      imgHtml = `<img class="section-inline-img" src="${s.image}" onerror="this.style.display='none'">`;
    }
    div.innerHTML = `
      <h2>${i + 1}. ${esc(s.title) || 'Untitled'}</h2>
      <p>${(s.body || '').replace(/\n/g, '<br>')}</p>
      ${imgHtml}
    `;
    narrative.appendChild(div);

    // Image in right panel (only for classic/reverse layouts)
    if (!useInlineImages && s.image) {
      const img = document.createElement('img');
      img.src = s.image;
      img.dataset.idx = i;
      img.onerror = () => img.style.display = 'none';
      imgPanel.appendChild(img);
    }
  });

  // Init preview map
  setTimeout(() => {
    if (previewMap) previewMap.remove();

    function addPreviewMarkers() {
      sections.forEach((s, i) => {
        if (s.lat == null) return;
        const icon = L.divIcon({ className: '', html: `<div class="numbered-marker" id="pm-${i}">${i + 1}</div>`, iconSize: [26, 26], iconAnchor: [13, 13] });
        L.marker([s.lat, s.lng], { icon }).addTo(previewMap);
      });
    }

    function setupScrollSync() {
      const scrollRoot = document.getElementById('preview-mode');
      let lastActiveIdx2 = -1;
      const updateActiveSection = () => {
        const sectionEls = narrative.querySelectorAll('.story-section[data-idx]');
        const rootRect = scrollRoot.getBoundingClientRect();
        const viewportCenterY = rootRect.top + rootRect.height / 2;
        let best = null, bestDist = Infinity;
        sectionEls.forEach(el => {
          const rect = el.getBoundingClientRect();
          const centerY = rect.top + rect.height / 2;
          const dist = Math.abs(centerY - viewportCenterY);
          if (dist < bestDist) { bestDist = dist; best = el; }
        });
        if (!best) return;
        const idx = parseInt(best.dataset.idx);
        if (isNaN(idx)) return;
        if (idx === lastActiveIdx2) return;
        lastActiveIdx2 = idx;
        const s = sections[idx];
        narrative.querySelectorAll('.story-section').forEach(el => el.classList.add('dim'));
        best.classList.remove('dim');
        if (s.lat != null) previewMap.flyTo([s.lat, s.lng], useCustomMap ? customMapZoom : mapZoom, { duration: 0.7, easeLinearity: 0.5 });
        document.querySelectorAll('.numbered-marker').forEach(el => el.classList.remove('active-marker'));
        const pm = document.getElementById('pm-' + idx);
        if (pm) pm.classList.add('active-marker');
        if (imgPanel.children.length) {
          imgPanel.querySelectorAll('img').forEach(img => img.classList.remove('active-img'));
          const activeImg = imgPanel.querySelector(`img[data-idx="${idx}"]`);
          if (activeImg) activeImg.classList.add('active-img');
        }
      };
      scrollRoot.addEventListener('scroll', updateActiveSection, { passive: true });
      updateActiveSection();
    }

    if (useCustomMap && customMapImage) {
      const img = new Image();
      img.onload = () => {
        const bounds = [[0, 0], [img.height, img.width]];
        previewMap = L.map('map-preview', { crs: L.CRS.Simple, zoomControl: true, scrollWheelZoom: false, minZoom: -3, maxZoom: 5, zoomSnap: 0.25, attributionControl: false });
        L.imageOverlay(customMapImage, bounds).addTo(previewMap);
        previewMap.fitBounds(bounds, { padding: [0, 0] });
        previewMap.setMaxBounds(bounds);
        addPreviewMarkers();
        const first = sections.find(s => s.lat != null);
        if (first) previewMap.setView([first.lat, first.lng], customMapZoom);
        setupScrollSync();
      };
      img.src = customMapImage;
    } else {
      previewMap = L.map('map-preview', { zoomControl: true, scrollWheelZoom: false }).setView([20, 0], 2);
      L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(previewMap);
      addPreviewMarkers();
      previewMap.on('zoomend', () => {
        mapZoom = previewMap.getZoom();
        if (currentStorymapId) save();
      });
      const first = sections.find(s => s.lat != null);
      if (first) previewMap.setView([first.lat, first.lng], mapZoom);
      setupScrollSync();
    }
  }, 100);
}

// ── Export ──
document.getElementById('btn-export').addEventListener('click', () => {
  const html = generateExport();
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (storyTitle || 'storymap').replace(/[^a-z0-9]/gi, '_') + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
});

function generateExport() {
  const secs = JSON.stringify(sections);
  const pal = PALETTES[paletteId] || PALETTES.cabin;
  const lay = layoutId || 'classic';
  const cov = coverId || 'center';
  const isInline = (lay === 'immersive');

  // Cover-specific CSS
  let coverCSS = '';
  let heroClass = '';
  if (cov === 'side') {
    heroClass = ' hero-side';
    coverCSS = `#hero.hero-side{align-items:flex-start;justify-content:flex-start;text-align:left;padding:60px 60px 0;background-position:bottom center}
#hero.hero-side.has-bg::before{top:auto;bottom:0;height:55%;background:linear-gradient(to top,rgba(0,0,0,.1),transparent)}
#hero.hero-side h1{font-size:52px;font-weight:900;color:${pal.text};text-shadow:none;max-width:700px}
#hero.hero-side p{color:${pal.textMuted};text-shadow:none;font-size:18px;max-width:600px}
#hero.hero-side .scroll-hint{color:${pal.textMuted}}`;
  } else if (cov === 'bold') {
    heroClass = ' hero-bold';
    coverCSS = `#hero.hero-bold{align-items:flex-start;justify-content:flex-end;text-align:left;padding:0 60px 60px}
#hero.hero-bold.has-bg::before{background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.2) 40%,transparent 70%)}
#hero.hero-bold h1{font-size:56px;font-weight:900;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.8);max-width:700px}
#hero.hero-bold p{color:rgba(255,255,255,.85);text-shadow:0 1px 8px rgba(0,0,0,.6);font-size:18px;max-width:600px}
#hero.hero-bold .scroll-hint{color:rgba(255,255,255,.6)}`;
  }

  // Layout-specific CSS
  let layoutCSS = '';
  if (lay === 'reverse') {
    layoutCSS = '#story-body{flex-direction:row-reverse}';
  } else if (lay === 'immersive') {
    layoutCSS = `#story-body{display:block;position:relative}
#left{width:100%;padding:0;position:relative;z-index:2}
#map{position:fixed;top:0;left:0;width:100%;height:100vh;z-index:1;border-radius:0;margin:0;border:none}
#narrative{position:relative;z-index:2;max-width:420px;margin-left:40px;padding-top:30vh;padding-bottom:30vh}
.story-section{background:${pal.bg};border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.25);padding:30px;margin-bottom:50vh;min-height:auto}
.story-section.dim{opacity:.7}
.section-inline-img{width:100%;border-radius:6px;margin-top:12px}
#right{display:none}`;
  }

  // Build section HTML for inline-image layouts
  const sectionBuildJS = isInline
    ? `sections.forEach(function(s,i){
  var d=document.createElement('div');d.className='story-section';d.dataset.idx=i;
  var imgHtml=s.image?'<img class="section-inline-img" src="'+s.image+'" onerror="this.style.display=\\'none\\'">':'';
  d.innerHTML='<h2>'+(i+1)+'. '+(s.title||'Untitled')+'</h2><p>'+(s.body||'').replace(/\\n/g,'<br>')+'</p>'+imgHtml;
  narrative.appendChild(d);
});`
    : `sections.forEach(function(s,i){
  var d=document.createElement('div');d.className='story-section';d.dataset.idx=i;
  d.innerHTML='<h2>'+(i+1)+'. '+(s.title||'Untitled')+'</h2><p>'+(s.body||'').replace(/\\n/g,'<br>')+'</p>';
  narrative.appendChild(d);
  if(s.image){var img=document.createElement('img');img.src=s.image;img.dataset.idx=i;img.onerror=function(){this.style.display='none'};right.appendChild(img);}
});`;

  const imgSyncJS = isInline ? '' : `
    right.querySelectorAll('img').forEach(function(img){img.classList.remove('active-img')});
    var ai=right.querySelector('img[data-idx="'+idx+'"]');if(ai)ai.classList.add('active-img');`;

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>${esc(storyTitle)}</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:${pal.bg};color:${pal.text};height:100vh;overflow:hidden}
#scroll-container{height:100vh;overflow-y:auto;background:${pal.bg}}
#hero{width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:${pal.bg};background-size:cover;background-position:center;position:relative}
#hero.has-bg::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.55)}
#hero h1{position:relative;z-index:1;font-size:48px;color:${pal.accent};text-shadow:0 2px 12px rgba(0,0,0,.7);margin-bottom:16px}
#hero p{position:relative;z-index:1;font-size:20px;color:${pal.textMuted};text-shadow:0 1px 6px rgba(0,0,0,.6);max-width:600px;line-height:1.6}
#hero .scroll-hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:1;font-size:13px;color:#888;letter-spacing:1px}
#hero .scroll-hint span{display:block;margin-top:6px;animation:bounce 2s infinite;font-size:20px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
#story-body{display:flex;align-items:flex-start;min-height:100vh;background:${pal.bg}}
#left{width:35%;background:${pal.bg};padding:16px}
#map{position:sticky;top:16px;width:100%;height:35vh;border-bottom:1px solid ${pal.border};z-index:10;border-radius:8px;overflow:hidden;margin-bottom:16px}
#narrative{width:100%}
#right{position:sticky;top:0;width:65%;height:100vh;display:flex;align-items:center;justify-content:center;background:${pal.bgDark};overflow:hidden}
#right img{position:absolute;width:100%;height:100%;object-fit:contain;border-radius:10px;transition:opacity 1.2s ease;opacity:0}
#right img.active-img{opacity:1}
.story-section{min-height:60vh;display:flex;flex-direction:column;justify-content:center;padding:40px 30px;transition:opacity .4s}
.story-section.dim{opacity:.25}
.story-section h2{font-size:26px;color:${pal.accent};margin-bottom:14px}
.story-section p{font-size:15px;line-height:1.7;color:${pal.textMuted}}
.numbered-marker{background:${pal.accent};color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.numbered-marker.active-marker{background:#fff;color:${pal.accent};transform:scale(1.3)}
.leaflet-control-zoom a{background:${pal.bgSecondary}!important;color:${pal.controlText}!important;border-color:${pal.border}!important}
.leaflet-control-zoom a:hover{background:${pal.border}!important;color:${pal.controlText}!important}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:${pal.bg}}::-webkit-scrollbar-thumb{background:${pal.secondary};border-radius:3px}
${coverCSS}
${layoutCSS}
</style>
</head>
<body>
<div id="scroll-container">
<div id="hero" class="${heroClass.trim()}"><h1${heroTextColor ? ` style="color:${heroTextColor.replace(/'/g, "\\'")}"` : ''}>${esc(storyTitle).replace(/'/g, "\\'")}</h1><p${heroTextColor ? ` style="color:${heroTextColor.replace(/'/g, "\\'")}"` : ''}>${esc(heroSubtitle).replace(/'/g, "\\'")}</p><div class="scroll-hint">Scroll to explore<span>&#x25BC;</span></div></div>
<div id="story-body"><div id="left"><div id="map"></div><div id="narrative"></div></div><div id="right"></div></div>
</div>
${useCustomMap && customMapImage ? `<img id="custom-map-src" src="${customMapImage.replace(/"/g, '&quot;')}" style="display:none">` : ''}
<script>
var sections=${secs};
var useCustomMap=${useCustomMap};
var sc=document.getElementById('scroll-container');
${heroImage ? `var h=document.getElementById('hero');h.classList.add('has-bg');h.style.backgroundImage='url(${heroImage.replace(/'/g, "\\'")})'` : ''}
var narrative=document.getElementById('narrative');
var right=document.getElementById('right');
${sectionBuildJS}
function addMarkers(map){
  sections.forEach(function(s,i){
    if(s.lat==null)return;
    var icon=L.divIcon({className:'',html:'<div class="numbered-marker" id="pm-'+i+'">'+(i+1)+'</div>',iconSize:[26,26],iconAnchor:[13,13]});
    L.marker([s.lat,s.lng],{icon:icon}).addTo(map);
  });
}
function setupScroll(map){
  var lastActiveIdx=-1;
  var updateActiveSection=function(){
    var sectionEls=narrative.querySelectorAll('.story-section[data-idx]');
    var rootRect=sc.getBoundingClientRect();
    var viewportCenterY=rootRect.top+rootRect.height/2;
    var best=null,bestDist=Infinity;
    sectionEls.forEach(function(el){
      var rect=el.getBoundingClientRect();
      var centerY=rect.top+rect.height/2;
      var dist=Math.abs(centerY-viewportCenterY);
      if(dist<bestDist){bestDist=dist;best=el;}
    });
    if(!best)return;
    var idx=parseInt(best.dataset.idx);if(isNaN(idx))return;
    if(idx===lastActiveIdx)return;
    lastActiveIdx=idx;
    var s=sections[idx];
    narrative.querySelectorAll('.story-section').forEach(function(el){el.classList.add('dim')});
    best.classList.remove('dim');
    if(s.lat!=null)map.flyTo([s.lat,s.lng],useCustomMap?${customMapZoom}:${mapZoom},{duration:0.7,easeLinearity:0.5});
    document.querySelectorAll('.numbered-marker').forEach(function(el){el.classList.remove('active-marker')});
    var pm=document.getElementById('pm-'+idx);if(pm)pm.classList.add('active-marker');${imgSyncJS}
  };
  sc.addEventListener('scroll',updateActiveSection,{passive:true});
  updateActiveSection();
}
if(useCustomMap){
  var cmSrc=document.getElementById('custom-map-src');
  if(cmSrc){
    var ci=new Image();ci.onload=function(){
      var bounds=[[0,0],[ci.height,ci.width]];
      var map=L.map('map',{crs:L.CRS.Simple,zoomControl:true,scrollWheelZoom:false,minZoom:-3,maxZoom:5,zoomSnap:0.25,attributionControl:false});
      L.imageOverlay(cmSrc.src,bounds).addTo(map);map.fitBounds(bounds,{padding:[0,0]});map.setMaxBounds(bounds);
      addMarkers(map);
      var first=sections.find(function(s){return s.lat!=null});
      if(first)map.setView([first.lat,first.lng],${customMapZoom});
      setupScroll(map);
    };ci.src=cmSrc.src;
  }
}else{
  var map=L.map('map',{zoomControl:true,scrollWheelZoom:false}).setView([20,0],2);
  L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'}).addTo(map);
  addMarkers(map);
  var first=sections.find(function(s){return s.lat!=null});
  if(first)map.setView([first.lat,first.lng],${mapZoom});
  setupScroll(map);
}
<\/script>
</body>
</html>`;
}
